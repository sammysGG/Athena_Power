---
# Athena range — SCADA / power-system target.
# Role tasks file: drop in as roles/<role>/tasks/main.yml (flat task list, NO
# play wrapper), same style as the other Athena range roles. Everything is in
# this one file: range vars (set_fact, overridable), the rendered .env, the
# four systemd units, nginx TLS, and the boot-time update unit.
#
# Runs natively under systemd (no Docker): four scada-* units off a shared
# Python venv, HMI behind nginx TLS, Modbus exposed on the OT VLAN. The
# lockdown lives in git — scada-update.service git-resets to origin/main on
# boot, so student edits to the code are wiped; the seeded .env survives.
#
# Expects {{ hostname }} and {{ domain }} from the surrounding playbook (same
# as the other range roles). Override any scada_* var with -e / group_vars.

- name: Set SCADA range variables (override via group_vars / -e)
  ansible.builtin.set_fact:
    scada_dir: "{{ scada_dir | default('/opt/scada-range') }}"
    scada_venv: "{{ scada_venv | default('/opt/scada-range/.venv') }}"
    scada_services:
      - scada-simulator.service
      - scada-modbus.service
      - scada-bridge.service
      - scada-hmi.service
    scada_site_name: "{{ scada_site_name | default('Athena Range') }}"
    hmi_username: "{{ hmi_username | default('admin') }}"
    hmi_password: "{{ hmi_password | default('Cool2Pass') }}"
    viewer_username: "{{ viewer_username | default('viewer') }}"
    viewer_password: "{{ viewer_password | default('viewer') }}"
    bridge_api_key: "{{ bridge_api_key | default('CHANGE_ME_BRIDGE') }}"
    simulator_api_key: "{{ simulator_api_key | default('CHANGE_ME_SIM') }}"
    hmi_bind: "{{ hmi_bind | default('0.0.0.0') }}"
    hmi_port: "{{ hmi_port | default(18080) }}"
    modbus_bind: "{{ modbus_bind | default('0.0.0.0') }}"
    modbus_port: "{{ modbus_port | default(15020) }}"
    poll_seconds: "{{ poll_seconds | default(1.0) }}"
    history_limit: "{{ history_limit | default(900) }}"
    event_limit: "{{ event_limit | default(2000) }}"
    range_open_firewall: "{{ range_open_firewall | default(false) }}"

- name: Install runtime packages (python, nginx, tooling)
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - git
      - nginx
      - openssl
      - ca-certificates
    state: present
    update_cache: yes

- name: Clone power repo
  ansible.builtin.git:
    repo: https://github.com/sammysGG/Athena_Power.git
    dest: "{{ scada_dir }}"
    version: main
    force: yes

- name: Create the venv and install each service's dependencies
  ansible.builtin.pip:
    requirements: "{{ scada_dir }}/services/{{ item }}/requirements.txt"
    virtualenv: "{{ scada_venv }}"
    virtualenv_command: python3 -m venv
  loop:
    - simulator
    - modbus-server
    - bridge
    - hmi

- name: Create scada system group
  ansible.builtin.group:
    name: scada
    system: true

- name: Create scada system user
  ansible.builtin.user:
    name: scada
    group: scada
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Create the bridge state directory (telemetry.db)
  ansible.builtin.file:
    path: /var/lib/scada
    state: directory
    owner: scada
    group: scada
    mode: '0750'

- name: Check if .env already exists
  ansible.builtin.stat:
    path: "{{ scada_dir }}/.env"
  register: scada_env

# Inlined here (was templates/env.j2). Under systemd the services run side by
# side on the host, so inter-service URLs point at 127.0.0.1 instead of compose
# service names. API keys are exposed under both the SCADA_* names (simulator)
# and the bare names (bridge + hmi). First deploy only — preserves blue-team
# hardening of the creds on re-runs.
- name: Render the shared .env (first deploy only)
  ansible.builtin.copy:
    dest: "{{ scada_dir }}/.env"
    owner: scada
    group: scada
    mode: '0640'
    content: |
      # Managed by Ansible.
      SCADA_STACK_NAME=scada
      SCADA_DOMAIN={{ hostname }}.{{ domain }}
      SCADA_SITE_NAME={{ scada_site_name }}

      SCADA_HMI_USERNAME={{ hmi_username }}
      SCADA_HMI_PASSWORD={{ hmi_password }}
      SCADA_HMI_VIEWER_USERNAME={{ viewer_username }}
      SCADA_HMI_VIEWER_PASSWORD={{ viewer_password }}

      SCADA_BRIDGE_API_KEY={{ bridge_api_key }}
      SCADA_SIMULATOR_API_KEY={{ simulator_api_key }}
      BRIDGE_API_KEY={{ bridge_api_key }}
      SIMULATOR_API_KEY={{ simulator_api_key }}

      SIMULATOR_URL=http://127.0.0.1:9101
      MODBUS_HOST=127.0.0.1
      MODBUS_PORT={{ modbus_port }}
      POLL_SECONDS={{ poll_seconds }}
      HISTORY_LIMIT={{ history_limit }}
      EVENT_LIMIT={{ event_limit }}
      BRIDGE_DB_PATH=/var/lib/scada/telemetry.db

      BRIDGE_URL=http://127.0.0.1:9102

      SCADA_HMI_BIND_ADDRESS={{ hmi_bind }}
      SCADA_HMI_PUBLISHED_PORT={{ hmi_port }}
      SCADA_MODBUS_BIND_ADDRESS={{ modbus_bind }}
      SCADA_MODBUS_PUBLISHED_PORT={{ modbus_port }}
  when: not scada_env.stat.exists

- name: Own the deploy tree as scada
  ansible.builtin.file:
    path: "{{ scada_dir }}"
    state: directory
    owner: scada
    group: scada
    recurse: true

- name: Install the simulator unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/scada-simulator.service
    mode: '0644'
    content: |
      [Unit]
      Description=SCADA range - plant simulator (FastAPI)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=exec
      User=scada
      Group=scada
      WorkingDirectory={{ scada_dir }}/services/simulator
      EnvironmentFile={{ scada_dir }}/.env
      ExecStart={{ scada_venv }}/bin/uvicorn app:app --host 127.0.0.1 --port 9101
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Install the modbus-server unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/scada-modbus.service
    mode: '0644'
    content: |
      [Unit]
      Description=SCADA range - Modbus TCP slave (OT attack surface)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=exec
      User=scada
      Group=scada
      WorkingDirectory={{ scada_dir }}/services/modbus-server
      EnvironmentFile={{ scada_dir }}/.env
      ExecStart={{ scada_venv }}/bin/python app.py
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Install the bridge unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/scada-bridge.service
    mode: '0644'
    content: |
      [Unit]
      Description=SCADA range - protocol bridge / historian (FastAPI)
      After=network-online.target scada-simulator.service scada-modbus.service
      Wants=network-online.target scada-simulator.service scada-modbus.service

      [Service]
      Type=exec
      User=scada
      Group=scada
      WorkingDirectory={{ scada_dir }}/services/bridge
      EnvironmentFile={{ scada_dir }}/.env
      ExecStart={{ scada_venv }}/bin/uvicorn app:app --host 127.0.0.1 --port 9102
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Install the HMI unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/scada-hmi.service
    mode: '0644'
    content: |
      [Unit]
      Description=SCADA range - operator HMI (FastAPI)
      After=network-online.target scada-bridge.service
      Wants=network-online.target scada-bridge.service

      [Service]
      Type=exec
      User=scada
      Group=scada
      WorkingDirectory={{ scada_dir }}/services/hmi
      EnvironmentFile={{ scada_dir }}/.env
      ExecStart={{ scada_venv }}/bin/uvicorn app:app --host {{ hmi_bind }} --port {{ hmi_port }}
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and (re)start the scada services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: restarted
  loop: "{{ scada_services }}"

- name: Wait for the simulator
  ansible.builtin.uri:
    url: http://127.0.0.1:9101/health
    status_code: 200
  register: sim_health
  retries: 20
  delay: 3
  until: sim_health.status == 200

- name: Wait for the bridge
  ansible.builtin.uri:
    url: http://127.0.0.1:9102/health
    status_code: 200
  register: bridge_health
  retries: 20
  delay: 3
  until: bridge_health.status == 200

- name: Wait for the Modbus TCP slave to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ modbus_port }}"
    timeout: 30

- name: Wait for the HMI
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ hmi_port }}/health"
    status_code: 200
  register: hmi_health
  retries: 20
  delay: 3
  until: hmi_health.status == 200

- name: Allow HTTP/HTTPS through ufw
  ansible.builtin.command: "ufw allow {{ item }}/tcp"
  register: ufw_result
  changed_when: "'added' in ufw_result.stdout or 'updated' in ufw_result.stdout"
  failed_when: false
  loop:
    - 80
    - 443
    - "{{ modbus_port }}"
  when: range_open_firewall | default(false)

- name: Create TLS cert directory
  ansible.builtin.file:
    path: /etc/ssl/range
    state: directory
    mode: '0700'

- name: Generate self-signed TLS cert (shared range cert, first deploy only)
  ansible.builtin.shell:
    cmd: >
      openssl req -x509 -nodes -sha256 -days 825 -newkey rsa:2048
      -keyout /etc/ssl/range/key.pem -out /etc/ssl/range/cert.pem
      -subj "/C=UK/CN={{ hostname }}.{{ domain }}"
      -addext "subjectAltName=DNS:{{ hostname }}.{{ domain }}"
    executable: /bin/bash
    creates: /etc/ssl/range/cert.pem

- name: Configure nginx TLS reverse proxy for the HMI
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/scada-hmi.conf
    content: |
      server {
          listen 80;
          server_name {{ hostname }}.{{ domain }};
          return 301 https://$host$request_uri;
      }
      server {
          listen 443 ssl;
          server_name {{ hostname }}.{{ domain }};

          ssl_certificate     /etc/ssl/range/cert.pem;
          ssl_certificate_key /etc/ssl/range/key.pem;

          location / {
              proxy_pass http://127.0.0.1:{{ hmi_port }};
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

- name: Enable the HMI nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/scada-hmi.conf
    dest: /etc/nginx/sites-enabled/scada-hmi.conf
    state: link

- name: Disable the default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
    enabled: true

- name: Verify HTTPS HMI is serving through nginx
  ansible.builtin.uri:
    url: "https://127.0.0.1/health"
    validate_certs: false
    headers:
      Host: "{{ hostname }}.{{ domain }}"
    status_code: 200
  register: hmi_https
  retries: 5
  delay: 2
  until: hmi_https.status == 200

- name: Install boot-time update script
  ansible.builtin.copy:
    dest: /usr/local/bin/scada-update.sh
    mode: '0755'
    owner: root
    group: root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd {{ scada_dir }}
      git fetch --quiet origin main
      git reset --hard origin/main
      {{ scada_venv }}/bin/pip install -q \
        -r services/simulator/requirements.txt \
        -r services/modbus-server/requirements.txt \
        -r services/bridge/requirements.txt \
        -r services/hmi/requirements.txt
      chown -R scada:scada {{ scada_dir }}
      systemctl restart scada-simulator.service scada-modbus.service scada-bridge.service scada-hmi.service

- name: Install the scada-update systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/scada-update.service
    mode: '0644'
    owner: root
    group: root
    content: |
      [Unit]
      Description=Pull scada updates from git and restart the scada services
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      WorkingDirectory={{ scada_dir }}
      ExecStart=/usr/local/bin/scada-update.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

- name: Enable the update unit on boot
  ansible.builtin.systemd:
    name: scada-update.service
    enabled: true
    daemon_reload: true

- name: Print access info
  ansible.builtin.debug:
    msg:
      - "HMI:    https://{{ hostname }}.{{ domain }}   (nginx TLS -> 127.0.0.1:{{ hmi_port }})"
      - "Manual: https://{{ hostname }}.{{ domain }}/manual"
      - "Modbus: {{ hostname }}.{{ domain }}:{{ modbus_port }}  (HR20 writable, raw TCP)"
      - "Login:  {{ hmi_username }} / {{ hmi_password }}"
      - "Services: {{ scada_services | join(', ') }}"
